version: "3.9"

services:

  postgres:
    build: ../db/oltp/postgres
    container_name: taller02_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Adventureworks
    ports:
      - "5432:5432"
    volumes:
      - pgvolume:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Adventureworks"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: taller02_mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TuPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
      - ../db/bak:/var/opt/mssql_bak
    deploy:
      resources:
        limits:
          memory: 3g
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TuPassword123!' -Q 'SELECT 1' -No -l 5 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  olap_init:
    build: ../db/olap
    container_name: taller02_olap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres

volumes:
  sqlvolume:
  pgvolume: